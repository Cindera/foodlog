<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="飲食紀錄">
<meta name="theme-color" content="#F2F1EC">
<title>飲食紀錄</title>
<style>
  :root{
    --paper:#F2F1EC;
    --paper-alt:#E4E4EC;
    --ink:#232433;
    --ink-soft:#5C5D6E;
    --green:#3B4C7A;
    --green-deep:#2A3A63;
    --mustard:#D9A441;
    --terracotta:#B5563C;
    --card:#FFFFFF;
    --line:#D8D8E4;
    --meal-am:#D9A441;
    --meal-noon:#B5563C;
    --meal-pm:#2F6F6E;
    --meal-snack:#7D5486;
    --font-display:'Songti TC','Noto Serif TC',serif;
    --font-body:-apple-system,'PingFang TC','Helvetica Neue',sans-serif;
    --font-mono:ui-monospace,'SF Mono',Menlo,monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;background:var(--paper);color:var(--ink);
    font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
    overscroll-behavior-y:none;
  }
  #app{
    display:flex;flex-direction:column;height:100vh;height:100dvh;
    max-width:640px;margin:0 auto;position:relative;
  }
  header{
    padding:calc(env(safe-area-inset-top) + 14px) 18px 12px;
    background:var(--paper);
    border-bottom:1px solid var(--line);
    flex-shrink:0;
  }
  .header-row{display:flex;justify-content:space-between;align-items:baseline;}
  .app-title{font-family:var(--font-display);font-size:22px;font-weight:700;letter-spacing:1px;color:var(--green-deep);}
  .today-date{font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);margin-bottom:8px;}
  .ledger{
    margin-bottom:16px;background:var(--card);border:1px solid var(--line);
    border-radius:10px;padding:10px 14px;
  }
  .ledger-row{
    display:flex;justify-content:space-between;font-family:var(--font-mono);
    font-size:13px;padding:2px 0;color:var(--ink-soft);
  }
  .ledger-row.total{
    border-top:1px dashed var(--line);margin-top:6px;padding-top:6px;
    font-size:15px;color:var(--ink);font-weight:600;
  }
  .ledger-note{font-size:11px;color:var(--ink-soft);margin-top:4px;text-align:right;}

  main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 18px 100px;}
  .section{display:none;}
  .section.active{display:block;}

  .empty-state{
    text-align:center;color:var(--ink-soft);padding:50px 20px;
    font-size:14px;line-height:1.8;
  }
  .empty-state .big{font-size:34px;display:block;margin-bottom:8px;}

  .fab{
    position:fixed;right:calc(50% - 320px + 20px);bottom:calc(84px + env(safe-area-inset-bottom));
    width:56px;height:56px;border-radius:50%;
    background:var(--green);color:#fff;border:none;font-size:26px;
    box-shadow:0 6px 16px rgba(31,77,54,0.35);z-index:20;
    display:flex;align-items:center;justify-content:center;padding:0;line-height:1;
  }
  @media(max-width:680px){ .fab{right:20px;} }

  .copy-btn{
    display:block;width:100%;text-align:center;background:var(--green-deep);
    color:#fff;border:none;border-radius:10px;padding:12px;font-size:14px;
    font-family:var(--font-body);font-weight:600;margin-bottom:16px;
  }
  .copy-btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ink);}

  .card{
    background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:12px 14px;margin-bottom:10px;position:relative;
  }
  .card-top{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
  .meal-badge{
    font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;color:#fff;
    font-family:var(--font-body);
  }
  .meal-badge.早餐{background:var(--meal-am);}
  .meal-badge.午餐{background:var(--meal-noon);}
  .meal-badge.晚餐{background:var(--meal-pm);}
  .meal-badge.點心{background:var(--meal-snack);}
  .source-tag{font-size:11px;color:var(--ink-soft);font-family:var(--font-mono);}
  .card-name{font-size:16px;font-weight:700;margin:2px 0 2px;}
  .card-note{font-size:13px;color:var(--ink-soft);line-height:1.5;margin-bottom:4px;white-space:pre-wrap;}
  .macro-row{
    display:flex;gap:12px;font-family:var(--font-mono);font-size:12px;
    color:var(--ink-soft);flex-wrap:wrap;margin-top:4px;
  }
  .macro-row b{color:var(--ink);}
  .card-photo{width:100%;max-height:180px;object-fit:cover;border-radius:8px;margin-top:8px;}
  .card-actions{position:absolute;top:10px;right:10px;display:flex;gap:6px;}
  .icon-btn{
    width:28px;height:28px;border-radius:50%;border:1px solid var(--line);
    background:var(--paper);font-size:13px;color:var(--ink-soft);
  }

  .menu-card{display:flex;justify-content:space-between;align-items:center;gap:10px;}
  .menu-card .info{flex:1;min-width:0;}
  .add-quick{
    background:var(--green);color:#fff;border:none;border-radius:8px;
    padding:8px 12px;font-size:13px;font-weight:600;white-space:nowrap;
  }
  .inspire-card{
    background:linear-gradient(135deg,var(--green-deep),var(--green));
    color:#fff;border-radius:14px;padding:18px;margin-bottom:16px;
  }
  .inspire-label{font-size:12px;opacity:0.8;letter-spacing:2px;text-transform:uppercase;font-family:var(--font-mono);}
  .inspire-name{font-family:var(--font-display);font-size:22px;margin:6px 0 4px;}
  .inspire-actions{display:flex;gap:8px;margin-top:12px;}
  .inspire-actions button{
    flex:1;padding:10px;border-radius:8px;border:none;font-size:13px;font-weight:600;
  }
  .inspire-actions .primary{background:#fff;color:var(--green-deep);}
  .inspire-actions .secondary{background:rgba(255,255,255,0.18);color:#fff;}

  .history-date{
    display:flex;justify-content:space-between;align-items:center;
    background:var(--card);border:1px solid var(--line);border-radius:10px;
    padding:12px 14px;margin-bottom:8px;
  }
  .history-date .d-info{font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);}
  .history-date .d-date{font-family:var(--font-display);font-size:16px;font-weight:700;color:var(--ink);}
  .history-detail{margin:-2px 0 12px;padding:0 4px;}
  .history-subheading{font-family:var(--font-display);font-size:15px;color:var(--ink-soft);margin:20px 0 10px;padding-top:12px;border-top:1px dashed var(--line);}

  .week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .week-arrow{width:32px;height:32px;border-radius:50%;border:1px solid var(--line);background:var(--card);font-size:16px;color:var(--ink-soft);flex-shrink:0;}
  .week-arrow:disabled{opacity:0.3;}
  .day-chip.future{opacity:0.35;}
  .week-range{font-family:var(--font-mono);font-size:12px;color:var(--ink-soft);}
  .week-strip{display:flex;gap:6px;margin-bottom:16px;touch-action:pan-y;}
  .day-chip{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
    background:var(--card);border:1px solid var(--line);border-radius:10px;padding:8px 2px 10px;position:relative;
    font-family:var(--font-body);color:var(--ink-soft);min-width:0;
  }
  .day-chip .dc-wd{font-size:10px;}
  .day-chip .dc-num{font-size:15px;font-weight:700;color:var(--ink);}
  .day-chip .dc-dot{width:5px;height:5px;border-radius:50%;background:var(--green);position:absolute;bottom:4px;left:50%;transform:translateX(-50%);}
  .day-chip.is-today{border-color:var(--green);border-width:2px;}
  .day-chip.sel{background:var(--green);border-color:var(--green);}
  .day-chip.sel .dc-wd{color:rgba(255,255,255,0.85);}
  .day-chip.sel .dc-num{color:#fff;}
  .day-chip.sel .dc-dot{background:#fff;}
  #selectedDayDetail:empty{margin:0;}
  #selectedDayDetail{margin-bottom:4px;}

  .settings-item{
    background:var(--card);border:1px solid var(--line);border-radius:10px;
    padding:14px;margin-bottom:10px;
  }
  .settings-item .label{font-weight:700;font-size:14px;margin-bottom:4px;}
  .settings-item .desc{font-size:12px;color:var(--ink-soft);line-height:1.6;margin-bottom:10px;}
  .settings-item button, .settings-item label.file-btn{
    display:inline-block;background:var(--green);color:#fff;border:none;
    border-radius:8px;padding:9px 14px;font-size:13px;font-weight:600;
  }

  nav.tabbar{
    flex-shrink:0;display:flex;background:var(--card);border-top:1px solid var(--line);
    padding:8px 4px calc(8px + env(safe-area-inset-bottom));
  }
  nav.tabbar button{
    flex:1;background:none;border:none;display:flex;flex-direction:column;
    align-items:center;gap:2px;font-size:9.5px;color:var(--ink-soft);padding:4px 0;font-family:var(--font-body);
  }
  nav.tabbar button .ic{font-size:19px;}
  nav.tabbar button.active{color:var(--green-deep);font-weight:700;}

  /* modal */
  .overlay{
    position:fixed;inset:0;background:rgba(35,40,31,0.45);z-index:50;
    display:flex;align-items:flex-end;justify-content:center;
  }
  .sheet{
    background:var(--paper);width:100%;max-width:640px;max-height:88vh;overflow-y:auto;overflow-x:hidden;
    border-radius:18px 18px 0 0;padding:18px 18px calc(24px + env(safe-area-inset-bottom));
    -webkit-overflow-scrolling:touch;
  }
  .sheet h3{font-family:var(--font-display);margin:0 0 14px;font-size:19px;}
  .field{margin-bottom:14px;max-width:100%;}
  .field label{display:block;font-size:12px;color:var(--ink-soft);margin-bottom:5px;font-weight:600;}
  .field input[type=text],.field input[type=number],.field textarea, .field select{
    width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;
    font-size:15px;font-family:var(--font-body);background:#fff;color:var(--ink);box-sizing:border-box;
  }
  .field input[type=date],.field input[type=time]{
    width:100%;max-width:100%;padding:10px 6px;border:1px solid var(--line);border-radius:8px;
    font-size:14px;font-family:var(--font-body);background:#fff;color:var(--ink);box-sizing:border-box;
    -webkit-appearance:none;appearance:none;display:block;
  }
  .field textarea{resize:vertical;min-height:60px;font-family:var(--font-body);}
  .pillrow{display:flex;gap:8px;flex-wrap:wrap;}
  .pill{
    padding:8px 14px;border-radius:20px;border:1px solid var(--line);background:#fff;
    font-size:13px;color:var(--ink-soft);
  }
  .pill.sel{background:var(--green);color:#fff;border-color:var(--green);}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .photo-preview{width:100%;max-height:200px;object-fit:cover;border-radius:8px;margin-top:8px;}
  .file-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .sheet-actions{display:flex;gap:10px;margin-top:8px;}
  .sheet-actions button{flex:1;padding:13px;border-radius:10px;border:none;font-size:15px;font-weight:700;}
  .btn-save{background:var(--green);color:#fff;}
  .btn-cancel{background:var(--paper-alt);color:var(--ink);}

  .mode-hint{font-size:11px;color:var(--ink-soft);margin:-8px 0 14px;line-height:1.5;}

  .mealpick-overlay{position:fixed;inset:0;background:rgba(35,40,31,0.45);z-index:60;display:flex;align-items:center;justify-content:center;}
  .mealpick{background:var(--paper);border-radius:14px;padding:18px;width:290px;}
  .mealpick h4{margin:0 0 12px;font-family:var(--font-display);font-size:16px;}
  .mealpick .pillrow{margin-bottom:14px;}
  .mealpick button.cancel{width:100%;padding:10px;border:none;background:var(--paper-alt);border-radius:8px;color:var(--ink-soft);}
  .mealpick .servings-field{margin-bottom:14px;text-align:left;}
  .mealpick .servings-field label{display:block;font-size:12px;color:var(--ink-soft);margin-bottom:4px;font-weight:600;}
  .mealpick .servings-field input{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:8px;font-size:15px;font-family:var(--font-body);}
  .mealpick .confirm-btn{width:100%;padding:11px;border:none;background:var(--green);color:#fff;border-radius:8px;font-size:14px;font-weight:700;margin-bottom:8px;}

  .checkbox-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
  .checkbox-row input[type=checkbox]{width:18px;height:18px;flex-shrink:0;}
  .checkbox-row label{font-size:13px;color:var(--ink);font-weight:600;margin:0;}

  .pick-menu-btn{
    display:flex;align-items:center;justify-content:center;gap:6px;
    width:100%;padding:11px;border-radius:10px;border:1px dashed var(--green);
    background:rgba(47,111,78,0.06);color:var(--green-deep);font-size:14px;font-weight:600;
    margin-bottom:14px;
  }
  .picker-overlay{position:fixed;inset:0;background:rgba(35,40,31,0.45);z-index:65;display:flex;align-items:flex-end;justify-content:center;}
  .picker-sheet{background:var(--paper);width:100%;max-width:640px;max-height:75vh;overflow-y:auto;border-radius:18px 18px 0 0;padding:18px 18px calc(20px + env(safe-area-inset-bottom));-webkit-overflow-scrolling:touch;}
  .picker-sheet h4{font-family:var(--font-display);margin:0 0 12px;font-size:17px;}
  .picker-item{
    display:flex;justify-content:space-between;align-items:center;gap:10px;
    padding:12px;border:1px solid var(--line);border-radius:10px;background:#fff;margin-bottom:8px;
  }
  .picker-item .pi-name{font-weight:700;font-size:14px;}
  .picker-item .pi-sub{font-size:11px;color:var(--ink-soft);font-family:var(--font-mono);margin-top:2px;}
  .picker-item button{background:var(--green);color:#fff;border:none;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:600;flex-shrink:0;}
  .picker-cancel{width:100%;padding:10px;border:none;background:var(--paper-alt);border-radius:8px;color:var(--ink-soft);margin-top:4px;}

  .live-total{
    background:var(--paper-alt);border-radius:10px;padding:10px 12px;margin-bottom:14px;
    font-family:var(--font-mono);font-size:12px;color:var(--ink-soft);
  }
  .live-total b{color:var(--ink);}
  .store-line{font-size:12px;color:var(--ink-soft);margin:-2px 0 4px;}
  .portion-tag{font-family:var(--font-mono);font-size:11px;color:var(--ink-soft);}

  .profile-latest{
    background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:14px 16px;margin-bottom:16px;
  }
  .profile-latest .pl-date{font-family:var(--font-mono);font-size:12px;color:var(--ink-soft);margin-bottom:8px;}
  .profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .profile-stat{background:var(--paper-alt);border-radius:8px;padding:8px 10px;}
  .profile-stat .ps-label{font-size:11px;color:var(--ink-soft);}
  .profile-stat .ps-value{font-family:var(--font-mono);font-size:16px;font-weight:700;color:var(--ink);}
  .profile-stat .ps-delta{font-size:11px;font-family:var(--font-mono);margin-left:4px;}
  .delta-up{color:var(--terracotta);}
  .delta-down{color:var(--green-deep);}
  .method-tag{font-size:10px;color:var(--ink-soft);background:var(--paper-alt);padding:1px 6px;border-radius:10px;margin-left:6px;}
  .toast{
    position:fixed;left:50%;bottom:110px;transform:translateX(-50%);
    background:var(--ink);color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;
    z-index:80;opacity:0;transition:opacity .25s;pointer-events:none;
  }
  .toast.show{opacity:0.94;}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-row">
      <div class="app-title">飲食紀錄</div>
    </div>
  </header>

  <main>
    <section class="section active" id="tab-today">
      <div class="today-date" id="todayDateLabel"></div>
      <div class="ledger" id="ledgerToday"></div>
      <button class="copy-btn" id="copyTodayBtn">📋 複製今日紀錄（貼給 AI 講評）</button>
      <div id="todayList"></div>
    </section>

    <section class="section" id="tab-menu">
      <div id="inspireArea"></div>
      <button class="copy-btn ghost" id="newMenuItemBtn">＋ 新增常用菜單</button>
      <div id="menuList"></div>
    </section>

    <section class="section" id="tab-profile">
      <div class="profile-latest" id="profileLatest"></div>
      <div id="profileList"></div>
    </section>

    <section class="section" id="tab-history">
      <div id="weekStripArea"></div>
      <div id="selectedDayDetail"></div>
      <button class="copy-btn ghost" id="toggleFullHistoryBtn">📚 顯示完整歷史紀錄</button>
      <div id="fullHistoryWrap" style="display:none;">
        <div id="historyList"></div>
      </div>
    </section>

    <section class="section" id="tab-settings">
      <div class="settings-item">
        <div class="label">📦 匯出備份</div>
        <div class="desc">把所有紀錄、常用菜單與身形資料存成一個 JSON 檔，建議定期匯出存到雲端硬碟，避免資料遺失。</div>
        <button id="exportBtn">下載備份檔</button>
      </div>
      <div class="settings-item">
        <div class="label">📥 匯入備份</div>
        <div class="desc">選擇先前匯出的 JSON 檔還原資料，會覆蓋目前手機上的紀錄。</div>
        <label class="file-btn" for="importFile">選擇備份檔</label>
        <input type="file" id="importFile" accept="application/json" style="display:none;">
      </div>
      <div class="settings-item">
        <div class="label">ℹ️ 使用小提醒</div>
        <div class="desc">
          資料只存在這支手機、這個檔案裡，不會上傳雲端。<br>
          請不要移動或改名這個 HTML 檔案，否則已存的資料可能讀不到。<br>
          照片會自動壓縮後儲存，避免占用太多空間；若手機容量有限，建議定期匯出備份後清除較舊的照片紀錄。
        </div>
      </div>
      <div class="settings-item">
        <div class="label">🗑 清空所有資料</div>
        <div class="desc">會刪除所有飲食紀錄、常用菜單與身形資料，此動作無法復原，請先匯出備份。</div>
        <button id="clearAllBtn" style="background:var(--terracotta);">清空資料</button>
      </div>
    </section>
  </main>

  <button class="fab" id="fabAdd">＋</button>

  <nav class="tabbar">
    <button data-tab="today" class="active"><span class="ic">📝</span>今日</button>
    <button data-tab="menu"><span class="ic">⭐</span>常用</button>
    <button data-tab="profile"><span class="ic">📏</span>身形</button>
    <button data-tab="history"><span class="ic">📖</span>歷史</button>
    <button data-tab="settings"><span class="ic">⚙️</span>設定</button>
  </nav>
</div>

<div id="modalRoot"></div>
<div id="pickerRoot"></div>
<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  var MEAL_TYPES = ["早餐","午餐","晚餐","點心"];
  var SOURCE_TYPES = ["外食","自煮","包裝食品"];
  var UNIT_OPTIONS = ["ml","g","份","顆","片","包","碗","匙"];

  var state = { entries: [], menu: [], profiles: [] };

  function loadState(){
    try{ state.entries = JSON.parse(localStorage.getItem('ft_entries')||'[]'); }catch(e){ state.entries = []; }
    try{ state.menu = JSON.parse(localStorage.getItem('ft_menu')||'[]'); }catch(e){ state.menu = []; }
    try{ state.profiles = JSON.parse(localStorage.getItem('ft_profiles')||'[]'); }catch(e){ state.profiles = []; }
    migrateOldRecords();
  }
  function saveEntries(){ localStorage.setItem('ft_entries', JSON.stringify(state.entries)); }
  function saveMenu(){ localStorage.setItem('ft_menu', JSON.stringify(state.menu)); }
  function saveProfiles(){ localStorage.setItem('ft_profiles', JSON.stringify(state.profiles)); }

  // 把舊版資料格式轉換成新版(portionMode: total/ratio)，避免升級後舊紀錄消失
  function migrateOldRecords(){
    var changedEntries = false, changedMenu = false;
    state.entries.forEach(function(e){
      if(e.source === '超商'){ e.source = '包裝食品'; changedEntries = true; }
    });
    state.menu.forEach(function(m){
      if(m.source === '超商'){ m.source = '包裝食品'; changedMenu = true; }
    });
    state.entries.forEach(function(e){
      if(e.portionMode) return;
      if(e.caloriesPerServing!==undefined){
        e.portionMode = 'ratio';
        e.refAmount = 1;
        e.refUnit = e.portionLabel || '份';
        e.caloriesPerRef = e.caloriesPerServing; e.proteinPerRef = e.proteinPerServing;
        e.carbPerRef = e.carbPerServing; e.fatPerRef = e.fatPerServing;
        e.actualAmount = (e.servings!=null) ? e.servings : 1;
      } else {
        e.portionMode = 'total';
        e.totalCalories = (e.calories!=null)?e.calories:null;
        e.totalProtein = (e.protein!=null)?e.protein:null;
        e.totalCarb = (e.carb!=null)?e.carb:null;
        e.totalFat = (e.fat!=null)?e.fat:null;
      }
      ['calories','protein','carb','fat','caloriesPerServing','proteinPerServing','carbPerServing','fatPerServing','servings','portionLabel'].forEach(function(k){ delete e[k]; });
      changedEntries = true;
    });
    state.menu.forEach(function(m){
      if(m.portionMode) return;
      if(m.caloriesPerServing!==undefined){
        m.portionMode = 'ratio';
        m.refAmount = 1;
        m.refUnit = m.portionLabel || '份';
        m.caloriesPerRef = m.caloriesPerServing; m.proteinPerRef = m.proteinPerServing;
        m.carbPerRef = m.carbPerServing; m.fatPerRef = m.fatPerServing;
      } else {
        m.portionMode = 'total';
        m.totalCalories = (m.calories!=null)?m.calories:null;
        m.totalProtein = (m.protein!=null)?m.protein:null;
        m.totalCarb = (m.carb!=null)?m.carb:null;
        m.totalFat = (m.fat!=null)?m.fat:null;
      }
      ['calories','protein','carb','fat','caloriesPerServing','proteinPerServing','carbPerServing','fatPerServing','portionLabel'].forEach(function(k){ delete m[k]; });
      changedMenu = true;
    });
    if(changedEntries) saveEntries();
    if(changedMenu) saveMenu();
  }

  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
  function pad(n){ return n<10?'0'+n:''+n; }
  function todayStr(){ var d=new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
  function nowTimeStr(){ var d=new Date(); return pad(d.getHours())+':'+pad(d.getMinutes()); }
  function escapeHtml(s){
    if(s===undefined||s===null) return '';
    return String(s).replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }
  function fmtDateLabel(dstr){
    var parts = dstr.split('-');
    var d = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
    var wd = ['日','一','二','三','四','五','六'][d.getDay()];
    return parts[0]+'/'+parts[1]+'/'+parts[2]+' (週'+wd+')';
  }
  function fmtNum(n){
    if(n===null || n===undefined || isNaN(n)) return '';
    var r = Math.round(n*10)/10;
    return String(r);
  }

  var toastTimer = null;
  function toast(msg){
    var el = document.getElementById('toast');

  function copyText(text){
    function fallback(){
      var ta = document.createElement('textarea');
      ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
      document.body.appendChild(ta); ta.focus(); ta.select();
      try{ document.execCommand('copy'); toast('已複製到剪貼簿'); }
      catch(e){ toast('複製失敗，請手動選取'); }
      document.body.removeChild(ta);
    }
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(function(){ toast('已複製到剪貼簿'); }).catch(fallback);
    } else { fallback(); }
  }

  function compressImage(file, maxDim, quality){
    return new Promise(function(resolve, reject){
      var reader = new FileReader();
      reader.onload = function(e){
        var img = new Image();
        img.onload = function(){
          var w = img.width, h = img.height;
          if(w > maxDim || h > maxDim){
            if(w > h){ h = Math.round(h*maxDim/w); w = maxDim; }
            else { w = Math.round(w*maxDim/h); h = maxDim; }
          }
          var canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img,0,0,w,h);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function mealOrder(m){ var i = MEAL_TYPES.indexOf(m); return i<0?99:i; }
  function showStore(src){ return src==='外食' || src==='包裝食品'; }

  // 這筆紀錄某個營養素的「總量」。total模式直接讀總量欄位；ratio模式用 基準量對應營養 x (實際攝取量/基準量) 計算。
  function totalFor(e, key){
    if(e.portionMode === 'total'){
      var cap = key.charAt(0).toUpperCase()+key.slice(1);
      var v = e['total'+cap];
      return (v===null||v===undefined||v==='') ? null : Number(v);
    }
    var per = e[key+'PerRef'];
    if(per===null || per===undefined || per==='') return null;
    var ref = Number(e.refAmount);
    if(!ref){ return null; }
    var act = (e.actualAmount!==undefined && e.actualAmount!==null && e.actualAmount!=='') ? Number(e.actualAmount) : ref;
    return Number(per) * (act/ref);
  }
  function sumTotal(list, key){
    var total = 0, count = 0;
    list.forEach(function(e){
      var t = totalFor(e, key);
      if(t!==null){ total += t; count++; }
    });
    return {total: Math.round(total*10)/10, count: count};
  }

  // ---------- Profile (身形) tab ----------
  function computeBMR(weight, height, age, sex){
    if(!weight || !height || !age) return null;
    var base = 10*Number(weight) + 6.25*Number(height) - 5*Number(age);
    return Math.round(sex==='女' ? base-161 : base+5);
  }
  function sortedProfiles(){
    return state.profiles.slice().sort(function(a,b){
      var ka = a.date+' '+(a.time||''), kb = b.date+' '+(b.time||'');
      return ka<kb ? 1 : (ka>kb ? -1 : 0);
    });
  }
  function profileDelta(cur, prev, key){
    if(!prev || cur[key]==null || prev[key]==null) return '';
    var d = Math.round((Number(cur[key])-Number(prev[key]))*10)/10;
    if(d===0) return '<span class="ps-delta">（持平）</span>';
    var cls = d>0 ? 'delta-up' : 'delta-down';
    var arrow = d>0 ? '↑' : '↓';
    return '<span class="ps-delta '+cls+'">'+arrow+Math.abs(d)+'</span>';
  }

        '<div class="profile-stat"><div class="ps-label">體脂</div><div class="ps-value">'+(latest.bodyFat!=null?fmtNum(latest.bodyFat)+' %':'—')+profileDelta(latest,prev,'bodyFat')+'</div></div>' +

        createdAt: editing ? editing.createdAt : Date.now()
      };
      if(editing){
        var idx = state.profiles.findIndex(function(x){return x.id===editing.id;});
        state.profiles[idx] = obj;
      } else {
        state.profiles.push(obj);
      }
      saveProfiles();
      renderProfile();
      closeModal();
      toast('已儲存');
    };
  }

  function getRecentProfilesForDate(dateStr, n){
    return state.profiles.filter(function(p){ return p.date <= dateStr; })
      .sort(function(a,b){
        var ka=a.date+' '+(a.time||''), kb=b.date+' '+(b.time||'');
        return ka<kb?1:(ka>kb?-1:0);
      }).slice(0, n||3);
  }

  // ---------- History tab ----------
  var weekOffset = 0;
  function pad2(n){ return pad(n); }
  function dateToStr(d){ return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate()); }
  function getWeekDates(offset){
    var now = new Date();
    var day = now.getDay(); // 0=Sun..6=Sat
    var diffToMonday = (day===0 ? -6 : 1-day);
    var monday = new Date(now.getFullYear(), now.getMonth(), now.getDate()+diffToMonday+offset*7);
    var dates = [];
    for(var i=0;i<7;i++){ dates.push(new Date(monday.getFullYear(), monday.getMonth(), monday.getDate()+i)); }
    return dates;
  }
  function fmtWeekRangeLabel(dates){
    var a = dates[0], b = dates[6];
    return (a.getMonth()+1)+'/'+a.getDate()+' - '+(b.getMonth()+1)+'/'+b.getDate();
  }
  function renderWeekStrip(){
    var dates = getWeekDates(weekOffset);
    var entryDates = {};
    state.entries.forEach(function(e){ entryDates[e.date] = true; });
    var todayS = todayStr();
    var wdLabels = ['一','二','三','四','五','六','日'];
    var atPresent = weekOffset >= 0;
    var html = '<div class="week-nav">' +
        '<button type="button" class="week-arrow" id="weekPrev">‹</button>' +
        '<div class="week-range">'+fmtWeekRangeLabel(dates)+(weekOffset===0?'（本週）':'')+'</div>' +
        '<button type="button" class="week-arrow'+(atPresent?' disabled':'')+'" id="weekNext"'+(atPresent?' disabled':'')+'>›</button>' +
      '</div>' +
      '<div class="week-strip" id="weekStripDays">' +
        dates.map(function(d,i){
          var ds = dateToStr(d);
          var has = entryDates[ds];
          var isToday = ds===todayS;
          var isSel = ds===openHistoryDate;
          var isFuture = ds > todayS;
          return '<button type="button" class="day-chip'+(isSel?' sel':'')+(isToday?' is-today':'')+(isFuture?' future':'')+'" data-date="'+ds+'"'+(isFuture?' disabled':'')+'>' +
            '<span class="dc-wd">'+wdLabels[i]+'</span><span class="dc-num">'+d.getDate()+'</span>'+(has?'<span class="dc-dot"></span>':'') +
          '</button>';
        }).join('') +
      '</div>';
    var area = document.getElementById('weekStripArea');
    area.innerHTML = html;
    document.getElementById('weekPrev').onclick = function(){ weekOffset--; renderWeekStrip(); };
    if(!atPresent){
      document.getElementById('weekNext').onclick = function(){ weekOffset = Math.min(weekOffset+1, 0); renderWeekStrip(); };
    }
    area.querySelectorAll('.day-chip:not(.future)').forEach(function(btn){
      btn.onclick = function(){ App.toggleHistoryDate(btn.getAttribute('data-date')); };
    });
    // 手勢滑動切換週次（只能往過去滑，不能滑到未來週）
    var stripEl = document.getElementById('weekStripDays');
    var touchStartX = null;
    stripEl.addEventListener('touchstart', function(e){ touchStartX = e.touches[0].clientX; }, {passive:true});
    stripEl.addEventListener('touchend', function(e){
      if(touchStartX===null) return;
      var dx = e.changedTouches[0].clientX - touchStartX;
      if(Math.abs(dx) > 40){
        weekOffset += (dx<0 ? 1 : -1);
        weekOffset = Math.min(weekOffset, 0);
        renderWeekStrip();
      }
      touchStartX = null;
    }, {passive:true});
  }
  function renderSelectedDayDetail(){
    var box = document.getElementById('selectedDayDetail');

  // ---------- Day text generation ----------
  function generateDayText(dateStr){
    var list = state.entries.filter(function(e){ return e.date===dateStr; });
    list.sort(function(a,b){ return mealOrder(a.mealType)-mealOrder(b.mealType); });
    var lines = [];
    lines.push('📅 '+dateStr+' 飲食紀錄');
    lines.push('');
    if(list.length===0){ lines.push('（這天沒有紀錄）'); }
    list.forEach(function(e){
      var head = '【'+e.mealType+'】'+sourceLabel(e.source)+' - '+(e.name||'未命名');
      if(e.storeName) head += '（'+e.storeName+'）';
      lines.push(head);
      if(e.portionMode==='ratio' && e.refAmount){
        var act = (e.actualAmount!=null && e.actualAmount!=='') ? Number(e.actualAmount) : Number(e.refAmount);
        lines.push('營養標示基準：每'+fmtNum(e.refAmount)+e.refUnit+'，本次攝取 '+fmtNum(act)+e.refUnit);
      }
      var kcalT=totalFor(e,'calories'), proT=totalFor(e,'protein'), carbT=totalFor(e,'carb'), fatT=totalFor(e,'fat');
      var macro = [];
      if(kcalT!==null) macro.push('熱量 '+fmtNum(kcalT)+'kcal');
      if(proT!==null) macro.push('蛋白質 '+fmtNum(proT)+'g');
      if(carbT!==null) macro.push('碳水 '+fmtNum(carbT)+'g');
      if(fatT!==null) macro.push('脂肪 '+fmtNum(fatT)+'g');
      if(macro.length) lines.push(macro.join('｜'));
      else lines.push('（無營養標示資料'+(e.photo?'，已拍照存查':'')+'）');
      if(e.notes) lines.push('備註：'+e.notes);
      lines.push('');
    });
    var kcal = sumTotal(list,'calories');
    var protein = sumTotal(list,'protein');
    var carb = sumTotal(list,'carb');
    var fat = sumTotal(list,'fat');
    lines.push('---');
    lines.push('當日總計（僅計有數據的餐次）');
    lines.push('熱量：'+fmtNum(kcal.total)+' kcal（'+kcal.count+'/'+list.length+' 餐有記錄）');
    lines.push('蛋白質：'+fmtNum(protein.total)+'g｜碳水：'+fmtNum(carb.total)+'g｜脂肪：'+fmtNum(fat.total)+'g');

    var profiles = getRecentProfilesForDate(dateStr, 3);
    if(profiles.length>0){
      lines.push('');
      lines.push('---');
      lines.push('👤 身形參考（最新'+profiles.length+'筆，供評估用）');
      profiles.forEach(function(p){
        var seg = [];
        if(p.weight!=null) seg.push('體重 '+fmtNum(p.weight)+'kg');
        if(p.bodyFat!=null) seg.push('體脂 '+fmtNum(p.bodyFat)+'%');
        if(p.bmrValue!=null) seg.push('BMR '+fmtNum(p.bmrValue)+'kcal('+(p.bmrMethod==='auto'?'自動估算':'手動輸入')+')');
        lines.push(fmtDateLabel(p.date)+' '+(p.time||'')+'　'+seg.join('・'));
      });
      if(profiles[0].height!=null) lines.push('身高：'+fmtNum(profiles[0].height)+'cm');
    }
    lines.push('');
    lines.push('請幫我依照這份紀錄，講評今天的飲食均衡程度，並給我明天的建議。');
    return lines.join('\n');
  }

            document.getElementById('f_carbPerRef').value = m.carbPerRef!=null?m.carbPerRef:'';
            document.getElementById('f_fatPerRef').value = m.fatPerRef!=null?m.fatPerRef:'';
            document.getElementById('f_actualAmount').value = m.refAmount!=null?m.refAmount:'';
          }
          draftPhoto = m.photo || null;
          document.getElementById('f_photoPreview').src = draftPhoto || '';
          document.getElementById('f_photoPreview').style.display = draftPhoto ? 'block' : 'none';
          document.getElementById('f_photoRemove').style.display = draftPhoto ? 'inline-flex' : 'none';
          updateLiveTotal();
          toast('已帶入「'+(m.name||'')+'」，記得確認本次攝取量');
        });
      };
    }

    document.getElementById('f_photo').onchange = function(e){
      var file = e.target.files[0];
      if(!file) return;
      compressImage(file, 900, 0.6).then(function(dataUrl){
        draftPhoto = dataUrl;
        document.getElementById('f_photoPreview').src = dataUrl;
        document.getElementById('f_photoPreview').style.display = 'block';
        document.getElementById('f_photoRemove').style.display = 'inline-flex';
      }).catch(function(){ toast('照片處理失敗'); });
    };
    document.getElementById('f_photoRemove').onclick = function(){
      draftPhoto = null;
      document.getElementById('f_photoPreview').style.display = 'none';
      document.getElementById('f_photo').value = '';
    };

    document.getElementById('f_cancel').onclick = closeModal;
    document.getElementById('entryOverlay').onclick = function(e){ if(e.target.id==='entryOverlay') closeModal(); };

    document.getElementById('f_save').onclick = function(){
      var selMeal = isEntry ? pillMeal.querySelector('.pill.sel').getAttribute('data-val') : null;
      var selSource = pillSource.querySelector('.pill.sel').getAttribute('data-val');
      var selMode = pillMode.querySelector('.pill.sel').getAttribute('data-val');
      var name = document.getElementById('f_name').value.trim();
      var notes = document.getElementById('f_notes').value.trim();
      var storeName = showStore(selSource) ? document.getElementById('f_storeName').value.trim() : '';
      if(!name){ toast('請至少填寫品名'); return; }

      var obj = {
        id: editing ? editing.id : uid(),
        source: selSource,
        storeName: storeName,
        name: name,
        notes: notes,
        portionMode: selMode,
        photo: draftPhoto,
        createdAt: editing ? editing.createdAt : Date.now()
      };
      if(selMode==='total'){
        var tc=document.getElementById('f_totalCalories').value, tp=document.getElementById('f_totalProtein').value,
            tcb=document.getElementById('f_totalCarb').value, tf=document.getElementById('f_totalFat').value;
        obj.totalCalories = tc===''?null:Number(tc);
        obj.totalProtein = tp===''?null:Number(tp);
        obj.totalCarb = tcb===''?null:Number(tcb);
        obj.totalFat = tf===''?null:Number(tf);
      } else {
        var ra=document.getElementById('f_refAmount').value, ru=getUnitValue();
        var cpr=document.getElementById('f_calPerRef').value, ppr=document.getElementById('f_proPerRef').value,
            cbpr=document.getElementById('f_carbPerRef').value, fpr=document.getElementById('f_fatPerRef').value;
        obj.refAmount = ra===''?null:Number(ra);
        obj.refUnit = ru || '份';
        obj.caloriesPerRef = cpr===''?null:Number(cpr);
        obj.proteinPerRef = ppr===''?null:Number(ppr);
        obj.carbPerRef = cbpr===''?null:Number(cbpr);
        obj.fatPerRef = fpr===''?null:Number(fpr);
      }

      if(isEntry){
        if(selMode==='ratio'){
          var av = document.getElementById('f_actualAmount').value;
          obj.actualAmount = av===''? obj.refAmount : Number(av);
        }
        obj.date = document.getElementById('f_date').value || todayStr();
        obj.mealType = selMeal;
        if(editing){
          var idx = state.entries.findIndex(function(x){return x.id===editing.id;});
          state.entries[idx] = obj;
        } else {
          state.entries.push(obj);
        }
        saveEntries();

        if(document.getElementById('f_saveToMenu').checked){
          var menuObj = {
            id: uid(), source: obj.source, storeName: obj.storeName, name: obj.name,
            notes: obj.notes, portionMode: obj.portionMode, photo: obj.photo, createdAt: Date.now()
          };
          if(obj.portionMode==='total'){
            menuObj.totalCalories=obj.totalCalories; menuObj.totalProtein=obj.totalProtein;
            menuObj.totalCarb=obj.totalCarb; menuObj.totalFat=obj.totalFat;
          } else {
            menuObj.refAmount=obj.refAmount; menuObj.refUnit=obj.refUnit;
            menuObj.caloriesPerRef=obj.caloriesPerRef; menuObj.proteinPerRef=obj.proteinPerRef;
            menuObj.carbPerRef=obj.carbPerRef; menuObj.fatPerRef=obj.fatPerRef;
          }
          state.menu.push(menuObj);
          saveMenu();
        }
        renderLedger(); renderToday(); refreshHistoryViews(); renderMenu();
      } else {
        if(editing){
          var idx2 = state.menu.findIndex(function(x){return x.id===editing.id;});
          state.menu[idx2] = obj;
        } else {
          state.menu.push(obj);
        }
        saveMenu();
        renderMenu();
      }
      closeModal();
      toast('已儲存');
    };
  }

  function closeModal(){ document.getElementById('modalRoot').innerHTML=''; }

  function openMenuPickerForEntry(onPick){
    var root = document.getElementById('pickerRoot');
    var items = state.menu.slice().sort(function(a,b){ return (b.createdAt||0)-(a.createdAt||0); });
    function closePicker(){ root.innerHTML=''; }
    root.innerHTML = '' +
      '<div class="picker-overlay" id="pkOverlay">' +
        '<div class="picker-sheet">' +
          '<h4>選擇常用菜單帶入</h4>' +
          items.map(function(m){
            var sub = sourceLabel(m.source) + (m.storeName? '・'+escapeHtml(m.storeName):'') + '・' + menuNutritionSummaryPlain(m);
            return '<div class="picker-item"><div><div class="pi-name">'+escapeHtml(m.name||'（未命名）')+'</div><div class="pi-sub">'+sub+'</div></div><button type="button" data-id="'+m.id+'">選擇</button></div>';
          }).join('') +
          '<button class="picker-cancel" id="pkCancel">取消</button>' +
        '</div>' +
      '</div>';
    root.querySelectorAll('.picker-item button').forEach(function(btn){
      btn.onclick = function(){
        var m = state.menu.find(function(x){ return x.id===btn.getAttribute('data-id'); });
        closePicker();
        if(m) onPick(m);
      };
    });
    document.getElementById('pkCancel').onclick = closePicker;
    document.getElementById('pkOverlay').onclick = function(e){ if(e.target.id==='pkOverlay') closePicker(); };
  }
  function menuNutritionSummaryPlain(m){
    if(m.portionMode==='total') return m.totalCalories!=null ? (fmtNum(m.totalCalories)+' kcal') : '未填熱量';
    return m.caloriesPerRef!=null ? (fmtNum(m.caloriesPerRef)+' kcal/'+fmtNum(m.refAmount)+(m.refUnit||'')) : '未填熱量';
  }

  function openMealPicker(menuItem, onPick){
    var root = document.getElementById('modalRoot');
    var isRatio = menuItem.portionMode === 'ratio';
    root.innerHTML = '' +
      '<div class="mealpick-overlay" id="mpOverlay">' +
        '<div class="mealpick">' +
          '<h4>加入到今天的哪一餐？</h4>' +
          '<div class="pillrow" id="mpMeal">' + MEAL_TYPES.map(function(m){ return '<button type="button" class="pill" data-val="'+m+'">'+m+'</button>'; }).join('') + '</div>' +
          (isRatio ?
            '<div class="servings-field"><label>這次實際攝取量（標示基準：每'+fmtNum(menuItem.refAmount)+(menuItem.refUnit||'')+'）</label><input type="number" step="0.1" inputmode="decimal" id="mpAmount" value="'+menuItem.refAmount+'"></div>'
          : '<div class="mode-hint" style="margin-bottom:14px;">這個項目是固定總量，加入後會直接使用原本的營養數值。</div>') +
          '<button type="button" class="confirm-btn" id="mpConfirm">加入</button>' +
          '<button class="cancel" id="mpCancel">取消</button>' +
        '</div>' +
      '</div>';
    var selectedMeal = null;
    root.querySelectorAll('#mpMeal .pill').forEach(function(btn){
      btn.onclick = function(){
        root.querySelectorAll('#mpMeal .pill').forEach(function(b){b.classList.remove('sel');});
        btn.classList.add('sel');
        selectedMeal = btn.getAttribute('data-val');
      };
    });
    document.getElementById('mpConfirm').onclick = function(){
      if(!selectedMeal){ toast('請選擇餐別'); return; }
      var amount = null;
      if(isRatio){
        amount = parseFloat(document.getElementById('mpAmount').value);
        if(isNaN(amount) || amount<=0) amount = menuItem.refAmount;
      }
      closeModal();
      onPick(selectedMeal, amount);
    };
    document.getElementById('mpCancel').onclick = closeModal;
    document.getElementById('mpOverlay').onclick = function(e){ if(e.target.id==='mpOverlay') closeModal(); };
  }

  // ---------- Public API ----------
  window.App = {
    editEntry: function(id){ openEntryModal({mode:'entry', editId:id}); },
    deleteEntry: function(id){
      if(!confirm('確定要刪除這筆紀錄嗎？')) return;
      state.entries = state.entries.filter(function(e){return e.id!==id;});
      saveEntries(); renderLedger(); renderToday(); refreshHistoryViews();
      toast('已刪除');
    },
    editMenuItem: function(id){ openEntryModal({mode:'menu', editId:id}); },
    deleteMenuItem: function(id){
      if(!confirm('確定要刪除這個常用菜單項目嗎？')) return;
      state.menu = state.menu.filter(function(m){return m.id!==id;});
      saveMenu(); renderMenu();
      toast('已刪除');
    },
    quickAddFromMenu: function(id){
      var m = state.menu.find(function(x){return x.id===id;});
      if(!m) return;
      openMealPicker(m, function(mealType, amount){
        var obj = {
          id: uid(), date: todayStr(), mealType: mealType, source: m.source,
          storeName: m.storeName, name: m.name, notes: m.notes, portionMode: m.portionMode,
          photo: m.photo, createdAt: Date.now()
        };
        if(m.portionMode==='total'){
          obj.totalCalories=m.totalCalories; obj.totalProtein=m.totalProtein;
          obj.totalCarb=m.totalCarb; obj.totalFat=m.totalFat;
        } else {
          obj.refAmount=m.refAmount; obj.refUnit=m.refUnit;
          obj.caloriesPerRef=m.caloriesPerRef; obj.proteinPerRef=m.proteinPerRef;
          obj.carbPerRef=m.carbPerRef; obj.fatPerRef=m.fatPerRef;
          obj.actualAmount = amount;
        }
        state.entries.push(obj);
        saveEntries();
        renderLedger(); renderToday(); refreshHistoryViews();
        switchTab('today');
        toast('已加入今天的'+mealType);
      });
    },
    rerollInspire: function(){
      if(state.menu.length<=1){ renderInspire(); return; }
      var pool = state.menu.filter(function(m){return m.id!==currentInspireId;});
      currentInspireId = pool[Math.floor(Math.random()*pool.length)].id;
      renderInspire();
    },
    toggleHistoryDate: function(d){
      openHistoryDate = (openHistoryDate===d) ? null : d;
      refreshHistoryViews();
    },
    copyDayText: function(d){ copyText(generateDayText(d)); },
    editProfile: function(id){ openProfileModal(id); },
    deleteProfile: function(id){
      if(!confirm('確定要刪除這筆身形紀錄嗎？')) return;
      state.profiles = state.profiles.filter(function(p){return p.id!==id;});
      saveProfiles(); renderProfile();
      toast('已刪除');
    }
  };

  // ---------- Tabs ----------
  function switchTab(tab){
    document.querySelectorAll('.section').forEach(function(s){ s.classList.remove('active'); });
    document.getElementById('tab-'+tab).classList.add('active');
    document.querySelectorAll('nav.tabbar button').forEach(function(b){ b.classList.toggle('active', b.getAttribute('data-tab')===tab); });
    document.getElementById('fabAdd').style.display = (tab==='today' || tab==='profile') ? 'flex' : 'none';
  }
  document.querySelectorAll('nav.tabbar button').forEach(function(b){
    b.onclick = function(){ switchTab(b.getAttribute('data-tab')); };
  });

  document.getElementById('fabAdd').onclick = function(){
    var activeBtn = document.querySelector('nav.tabbar button.active');
    var tab = activeBtn ? activeBtn.getAttribute('data-tab') : 'today';
    if(tab==='profile') openProfileModal(null);
    else openEntryModal({mode:'entry'});
  };
  document.getElementById('newMenuItemBtn').onclick = function(){ openEntryModal({mode:'menu'}); };
  document.getElementById('copyTodayBtn').onclick = function(){ copyText(generateDayText(todayStr())); };
  document.getElementById('toggleFullHistoryBtn').onclick = function(){
    var wrap = document.getElementById('fullHistoryWrap');
    var showing = wrap.style.display !== 'none';
    wrap.style.display = showing ? 'none' : 'block';
    this.textContent = showing ? '📚 顯示完整歷史紀錄' : '📚 隱藏完整歷史紀錄';
  };

  document.getElementById('exportBtn').onclick = function(){
    var data = JSON.stringify({entries: state.entries, menu: state.menu, profiles: state.profiles, exportedAt: new Date().toISOString()}, null, 2);
    var blob = new Blob([data], {type:'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = 'foodlog-backup-'+todayStr()+'.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 2000);
    toast('備份已下載');
  };
  document.getElementById('importFile').onchange = function(e){
    var file = e.target.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(ev){
      try{
        var data = JSON.parse(ev.target.result);
        if(!confirm('匯入將覆蓋目前手機上的資料，確定要繼續嗎？')) return;
        state.entries = data.entries || [];
        state.menu = data.menu || [];
        state.profiles = data.profiles || [];
        saveEntries(); saveMenu(); saveProfiles();
        migrateOldRecords();
        renderLedger(); renderToday(); renderMenu(); refreshHistoryViews(); renderProfile();
        toast('匯入成功');
      }catch(err){ toast('檔案格式錯誤，匯入失敗'); }
    };
    reader.readAsText(file);
    e.target.value = '';
  };
  document.getElementById('clearAllBtn').onclick = function(){
    if(!confirm('確定要清空所有紀錄、常用菜單與身形資料嗎？此動作無法復原！')) return;
    if(!confirm('再次確認：真的要全部刪除嗎？')) return;
    state.entries = []; state.menu = []; state.profiles = [];
    saveEntries(); saveMenu(); saveProfiles();
    renderLedger(); renderToday(); renderMenu(); refreshHistoryViews(); renderProfile();
    toast('已清空');
  };

  // ---------- Init ----------
  loadState();
  renderLedger();
  renderToday();
  renderMenu();
  renderProfile();
  refreshHistoryViews();
})();
</script>
</body>
</html>
